<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>สุขสันต์วันวาเลนไทน์ ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300;400;500&family=Mali:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="intro-screen">
        <div class="envelope-container" onclick="openSurprise()">
            <div class="envelope">
                <div class="heart-seal">❤️</div>
            </div>
            <p class="tap-text">แตะเพื่อเปิดดูนะ หมูอ้วน</p>
        </div>
    </div>

    <div id="main-content" class="hidden">
        <div class="card">
            <h1 class="fade-in">Happy Valentine's Day! 💖</h1>
            
            <div class="photo-gallery fade-in">
                <img src="Moo2.jpg" alt="Photo 1" class="photo">
                <img src="Moo1.jpg" alt="Photo 2" class="photo">
            </div>

            <div class="message fade-in">
                <h2>ถึง หมูอ้วนน 🌷</h2>
                <p>
                    ขอบคุณที่อยู่กับเค้ามาตลอดนะครับ<br>
                    วาเลนไทน์ปีนี้ ขอให้เรามีความสุขด้วยกันมากๆนะครับ<br>
                    รักอ้วนๆที่สุดเลยนะครับ ❤️
                </p>
            </div>

            <div class="flower-decoration">
                🌻 🌹 🌷
            </div>
        </div>
    </div>

    <div id="falling-flowers"></div>

    <script src="script.js"></script>
</body>
</html>
